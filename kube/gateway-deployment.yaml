apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: ai-control
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: gateway:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: OPA_URL
              value: http://opa.policy.svc.cluster.local:8181/v1/data/mcp/authz/allow
          ports:
            - containerPort: 8080
