version: "3.9"

services:
  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    depends_on:
      - opa
      - security-agent

  opa:
    image: openpolicyagent/opa:latest
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "/policies"
    volumes:
      - ./policies:/policies
    ports:
      - "8181:8181"

  security-agent:
    build: ./agents
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    ports:
      - "8000:8000"
